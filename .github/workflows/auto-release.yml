name: Auto-release on version bump

# Runs on every push to master.
# If the version in package.json does not yet have a matching git tag,
# a GitHub Release is created, the .vsix is built, and it is attached
# to that release — all in one job.
#
# NOTE: a release created by GITHUB_TOKEN cannot trigger other workflow
# files, so the build step lives here rather than in release.yml.
on:
  push:
    branches: [master]

jobs:
  auto-release:
    name: Release if version is new
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Read version from package.json
        id: pkg
        run: echo "version=$(jq -r '.version' package.json)" >> "$GITHUB_OUTPUT"

      - name: Check whether tag already exists
        id: tag
        run: |
          if git ls-remote --tags origin "refs/tags/v${{ steps.pkg.outputs.version }}" \
             | grep -q .; then
            echo "exists=true"  >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Node.js
        if: steps.tag.outputs.exists == 'false'
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        if: steps.tag.outputs.exists == 'false'
        run: npm ci

      - name: Package extension
        if: steps.tag.outputs.exists == 'false'
        run: npx @vscode/vsce package --no-dependencies

      - name: Create GitHub Release and upload VSIX
        if: steps.tag.outputs.exists == 'false'
        run: |
          gh release create "v${{ steps.pkg.outputs.version }}" \
            *.vsix \
            --title "v${{ steps.pkg.outputs.version }}" \
            --generate-notes
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
