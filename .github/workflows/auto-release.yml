name: Auto-release on version bump

# Runs whenever package.json changes on master.
# If the version inside it does not yet have a matching git tag, a GitHub
# Release is created automatically. That publication then triggers release.yml
# which builds and attaches the .vsix asset.
on:
  push:
    branches: [master]
    paths:
      - package.json

jobs:
  auto-release:
    name: Create release if version is new
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Read version from package.json
        id: pkg
        run: echo "version=$(jq -r '.version' package.json)" >> "$GITHUB_OUTPUT"

      - name: Check whether tag already exists
        id: tag
        run: |
          if git ls-remote --tags origin "refs/tags/v${{ steps.pkg.outputs.version }}" \
             | grep -q .; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub Release
        if: steps.tag.outputs.exists == 'false'
        run: |
          gh release create "v${{ steps.pkg.outputs.version }}" \
            --title "v${{ steps.pkg.outputs.version }}" \
            --generate-notes
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
